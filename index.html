<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAEENZ | UNDERSWITCH — Disponibilidad de Booking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="card">
  <header class="card-header">
    <img src="profile.jpg" alt="Saeenz" class="profile-photo">
    <h1 class="logo">SAEENZ | UNDERSWITCH</h1>
    <p class="subtitle">Disponibilidad de Booking</p>
  </header>

  <hr class="divider">

  <section class="month-nav">
    <button id="prevMonth" class="nav-arrow" aria-label="Mes anterior">‹</button>
    <span id="monthLabel" class="month-label">Julio 2026</span>
    <button id="nextMonth" class="nav-arrow" aria-label="Mes siguiente">›</button>
  </section>

  <section id="datesRow" class="dates-row">
    <!-- Las píldoras de fechas se generan con JS -->
  </section>

  <hr class="divider">

  <section class="booking-action">
    <button id="openFormBtn" class="request-btn">
      <span class="calendar-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="5" width="18" height="16" rx="2"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
          <line x1="8" y1="3" x2="8" y2="7"/>
          <line x1="16" y1="3" x2="16" y2="7"/>
        </svg>
      </span>
      Solicitar una reserva
    </button>
    <p class="form-hint">Abrir formulario de booking</p>
  </section>
</main>

<!-- Modal del formulario -->
<div id="formModal" class="modal-overlay" hidden>
  <div class="modal-box">
    <button id="closeModal" class="modal-close" aria-label="Cerrar formulario">&times;</button>
    <h2 class="modal-title">Solicitar una reserva</h2>
    <p class="modal-subtitle">Completá el formulario y te respondemos por email.</p>

    <form id="bookingForm" action="https://formspree.io/f/TU_ENDPOINT_AQUI" method="POST">
      <label for="name">Nombre / Nombre del evento</label>
      <input type="text" id="name" name="name" required placeholder="Ej: Sofía Ramírez — Boda Ramírez">

      <label for="date">Fecha solicitada</label>
      <input type="date" id="date" name="date" required>

      <label for="contact">Email o WhatsApp</label>
      <input type="text" id="contact" name="contact" required placeholder="tu@email.com o +506 8888 8888">

      <label for="eventType">Tipo de evento</label>
      <select id="eventType" name="eventType" required>
        <option value="" disabled selected>Seleccioná una opción</option>
        <option value="boda">Boda</option>
        <option value="concierto">Concierto</option>
        <option value="club">Club / Discoteca</option>
        <option value="privado">Evento privado</option>
        <option value="corporativo">Evento corporativo</option>
        <option value="otro">Otro</option>
      </select>

      <label for="message">Mensaje / detalles adicionales</label>
      <textarea id="message" name="message" rows="4" placeholder="Contanos más sobre el evento, duración, ubicación, etc."></textarea>

      <button type="submit" class="submit-btn">Enviar solicitud</button>
      <p id="formStatus" class="form-status" role="status"></p>
    </form>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
